<template>
    <lightning-card title="FedEx Package Tracker">
        <div class="slds-p-around_medium">

            <lightning-input
                label="Tracking Number"
                value={trackingNumber}
                onchange={handleChange}>
            </lightning-input>

            <lightning-button
                label="Track"
                variant="brand"
                onclick={handleTrack}
                class="slds-m-top_small">
            </lightning-button>

            <template if:true={latestScan}>
                <p><strong>Date:</strong> {latestScan.date}</p>
                <p><strong>Status:</strong> {latestScan.description}</p>
            </template>

            <template if:true={error}>
                <div class="slds-text-color_error">{error}</div>
            </template>

        </div>
    </lightning-card>
</template>
